name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      clear_cache: ${{ steps.check.outputs.clear_cache }}
    steps:
      - name: Check commit message for build triggers
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          # Check for build action trigger
          if [[ "$COMMIT_MSG" == *"build action"* ]] || [[ "$COMMIT_MSG" == *"Build Action"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for release trigger
          if [[ "$COMMIT_MSG" == *"build release"* ]] || [[ "$COMMIT_MSG" == *"Build Release"* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for clear cache trigger
          if [[ "$COMMIT_MSG" == *"--clear"* ]]; then
            echo "clear_cache=true" >> $GITHUB_OUTPUT
            echo "⚠️ Cache will be cleared for this build"
          else
            echo "clear_cache=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true' || needs.check-trigger.outputs.should_release == 'true'
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cargo registry cache (rarely changes)
      - name: Cache Cargo registry
        if: needs.check-trigger.outputs.clear_cache != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # Cargo build cache (target directory)
      - name: Cache Cargo build
        if: needs.check-trigger.outputs.clear_cache != 'true'
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Clear cache notice
        if: needs.check-trigger.outputs.clear_cache == 'true'
        run: echo "🧹 Building without cache (--clear flag detected)"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri App
        run: cargo tauri build
        working-directory: .

      - name: Prepare release package
        run: |
          mkdir -p release
          mkdir -p release-portable
          
          # Copy exe
          cp src-tauri/target/release/wangyi-mc-checkworld-tauri.exe release/
          cp src-tauri/target/release/wangyi-mc-checkworld-tauri.exe release-portable/
          
          # Copy MSI installer
          cp src-tauri/target/release/bundle/msi/*.msi release/
          
          # Copy README
          cp README.md release/ 2>/dev/null || echo "No README.md"
          cp README.md release-portable/ 2>/dev/null || echo "No README.md"
          
          # Create portable zip (绿色版) - only exe and README
          cd release-portable
          7z a -tzip "../wangyi-mc-checkworld-tauri-windows-x64-绿色版.zip" *
        shell: bash

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-tauri-exe
          path: release/wangyi-mc-checkworld-tauri.exe

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-tauri-msi
          path: release/*.msi

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-tauri-windows-x64-绿色版
          path: wangyi-mc-checkworld-tauri-windows-x64-绿色版.zip

  release:
    needs: [check-trigger, build]
    if: needs.check-trigger.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 网易MC检查世界
            
            ### 📦 下载说明
            - **exe**: 便携版，直接运行 `wangyi-mc-checkworld-tauri.exe` 即可
            - **msi**: Windows 安装程序
            - **绿色版.zip**: 便携版，解压后运行 exe
            
            ### ✨ 功能
            - 📂 列出所有网易 MC 存档
            - 🔍 搜索和排序
            - 💾 备份存档为 ZIP
            - ✏️ 重命名存档
            - 🗑️ 删除存档
            
            ### 🖥️ 系统要求
            - Windows 10/11 x64
            - 已安装网易我的世界电脑版
          files: |
            artifacts/wangyi-mc-checkworld-tauri-exe/wangyi-mc-checkworld-tauri.exe
            artifacts/wangyi-mc-checkworld-tauri-msi/*.msi
            artifacts/wangyi-mc-checkworld-tauri-windows-x64-绿色版/*.zip
          draft: false
          prerelease: false
