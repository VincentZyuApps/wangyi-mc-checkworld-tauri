name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Check: 解析 commit message ─────────────────────────────
  check:
    name: Check triggers
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      clear_cache: ${{ steps.check.outputs.clear_cache }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check commit message for triggers
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          # PR always builds
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "clear_cache=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # build release = 构建 + Release
          if echo "$COMMIT_MSG" | grep -qi "build release"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          # build action = 仅构建
          elif echo "$COMMIT_MSG" | grep -qi "build action"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          
          # --clear = 清除缓存
          if echo "$COMMIT_MSG" | grep -qi "\-\-clear"; then
            echo "clear_cache=true" >> $GITHUB_OUTPUT
            echo "⚠️ Cache will be cleared for this build"
          else
            echo "clear_cache=false" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build: 构建应用 ─────────────────────────────────────
  build:
    name: Build Windows x64
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        if: needs.check.outputs.clear_cache != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        if: needs.check.outputs.clear_cache != 'true'
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Clear cache notice
        if: needs.check.outputs.clear_cache == 'true'
        run: echo "🧹 Building without cache (--clear flag detected)"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri App
        run: cargo tauri build

      - name: Prepare release package
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          mkdir -p release
          mkdir -p release-portable
          
          # Rename and copy exe with version + Windows x64
          cp src-tauri/target/release/wangyi-mc-checkworld-tauri.exe release/wangyi-mc-checkworld-v${VERSION}-windows-x64.exe
          cp src-tauri/target/release/wangyi-mc-checkworld-tauri.exe release-portable/wangyi-mc-checkworld-v${VERSION}-windows-x64.exe
          
          # Copy MSI and rename to unified format
          for msi in src-tauri/target/release/bundle/msi/*.msi; do
            newname="wangyi-mc-checkworld-v${VERSION}-windows-x64.msi"
            cp "$msi" release/"$newname"
          done
          
          # Copy README
          cp README.md release/ 2>/dev/null || echo "No README.md"
          cp README.md release-portable/ 2>/dev/null || echo "No README.md"
          
          # Create portable zip (green) with version
          cd release-portable
          7z a -tzip "../wangyi-mc-checkworld-v${VERSION}-windows-x64-green.zip" *

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-exe
          path: release/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64.exe

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-msi
          path: release/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64.msi

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-green
          path: wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-green.zip

  # ── 3. Release: 发布 GitHub Release ─────────────────────────
  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          body: |
            ## 网易MC检查世界 v${{ needs.check.outputs.version }}
            
            ### 📦 下载说明
            - **exe**: 便携版，直接运行 `wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64.exe` 即可
            - **msi**: Windows 安装程序
            - **绿色版.zip**: 便携版，解压后运行 exe
            
            ### ✨ 功能
            - 📂 列出所有网易 MC 存档
            - 🔍 搜索和排序
            - 💾 备份存档为 ZIP
            - ✏️ 重命名存档
            - 🗑️ 删除存档
            
            ### 🖥️ 系统要求
            - Windows 10/11 x64 (仅支持 64 位)
            - 已安装网易我的世界电脑版
          files: |
            artifacts/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-exe/*.exe
            artifacts/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-msi/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64.msi
            artifacts/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-green/wangyi-mc-checkworld-v${{ needs.check.outputs.version }}-windows-x64-green.zip
          draft: false
          prerelease: false