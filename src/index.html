<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC NetEase World Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="app-title">🎮 MC NetEase World Manager</h1>
      <div class="header-right">
        <div class="header-controls">
          <select id="locale-select" class="locale-select">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
          </select>
          <button id="theme-btn" class="btn btn-secondary btn-small" title="切换主题">
            <span id="theme-icon">🌓</span>
          </button>
          <button id="log-btn" class="btn btn-secondary btn-small" title="日志">
            �
          </button>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Search worlds...">
      </div>
      <div class="toolbar-actions">
        <button id="refresh-btn" class="btn btn-primary">🔄 Refresh</button>
        <select id="sort-select">
          <option value="time-desc">⏰ Latest First</option>
          <option value="time-asc">⏰ Oldest First</option>
          <option value="name-asc">📝 Name A-Z</option>
          <option value="name-desc">📝 Name Z-A</option>
          <option value="size-desc">💾 Largest First</option>
          <option value="size-asc">💾 Smallest First</option>
        </select>
      </div>
    </div>

    <!-- Path bar -->
    <div class="path-bar">
      <span id="path-bar-label">📂</span>
      <span id="path-bar-text">—</span>
      <button id="open-root-btn" class="btn btn-secondary btn-small" title="打开存档根目录">📁</button>
      <button id="copy-path-btn2" class="btn btn-secondary btn-small" title="复制路径">📋</button>
    </div>

    <div class="stats-bar">
      <span id="total-count">Total: 0 worlds</span>
      <span id="total-size">Total size: 0 MB</span>
    </div>

    <div class="worlds-table-container">
      <table class="worlds-table">
        <thead>
          <tr>
            <th class="col-index" id="th-index">#</th>
            <th class="col-name" id="th-name">World Name</th>
            <th class="col-folder" id="th-folder">Folder</th>
            <th class="col-time" id="th-time">Last Saved</th>
            <th class="col-size" id="th-size">Size</th>
            <th class="col-actions" id="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="worlds-tbody">
          <tr>
            <td colspan="6" class="loading">Loading worlds...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>

    <!-- Log window -->
    <div id="log-window" class="log-window hidden">
      <div class="log-header">
        <h3 id="log-title">� 日志</h3>
        <button id="log-close" class="btn btn-secondary btn-small">✕</button>
      </div>
      <div id="log-path" class="log-path"></div>
      <pre id="log-content" class="log-content"></pre>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
