<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC NetEase World Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 MC NetEase World Manager</h1>
      <div class="header-info">
        <span id="worlds-path">Loading...</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Search worlds...">
      </div>
      <div class="toolbar-actions">
        <button id="refresh-btn" class="btn btn-primary">🔄 Refresh</button>
        <select id="sort-select">
          <option value="time-desc">⏰ Latest First</option>
          <option value="time-asc">⏰ Oldest First</option>
          <option value="name-asc">📝 Name A-Z</option>
          <option value="name-desc">📝 Name Z-A</option>
          <option value="size-desc">💾 Largest First</option>
          <option value="size-asc">💾 Smallest First</option>
        </select>
      </div>
    </div>

    <div class="stats-bar">
      <span id="total-count">Total: 0 worlds</span>
      <span id="total-size">Total size: 0 MB</span>
    </div>

    <div class="worlds-table-container">
      <table class="worlds-table">
        <thead>
          <tr>
            <th class="col-index">#</th>
            <th class="col-name">World Name</th>
            <th class="col-folder">Folder</th>
            <th class="col-time">Last Saved</th>
            <th class="col-size">Size</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="worlds-tbody">
          <tr>
            <td colspan="6" class="loading">Loading worlds...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Modal for confirmations -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">Confirm</h2>
        <p id="modal-message"></p>
        <div id="modal-input-container" class="hidden">
          <input type="text" id="modal-input" placeholder="">
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-confirm" class="btn btn-danger">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
